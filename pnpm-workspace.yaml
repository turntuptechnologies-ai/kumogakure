# Supply-chain hardening. Refuse to install dependency versions until
# they have been public for at least this many minutes, so a malicious
# release has a window in which it is typically detected and yanked.
#
# This is the install-layer counterpart to the Dependabot `cooldown`
# in .github/dependabot.yml: Dependabot cooldown only gates Dependabot
# PRs, whereas this also covers manual `pnpm add`, lockfile refreshes,
# and contributor machines. Frozen-lockfile installs (CI) are
# unaffected because they replay already-pinned versions rather than
# resolving new ones.
#
# 10080 minutes = 7 days, matching the smallest Dependabot cooldown
# tier (patch / github-actions). Add minimumReleaseAgeExclude below if
# a specific package ever needs to bypass this.
minimumReleaseAge: 10080

# Security pins for transitive (dev-tooling) dependencies whose parents
# (vitest, wrangler, miniflare, @cloudflare/vitest-pool-workers) still
# resolve to vulnerable versions. These are build/test-only — none ship
# in the deployed Worker bundle — and the advisories require unused code
# paths (vite dev server / undici SOCKS5 ProxyAgent) or Windows, so there
# is no production exposure here. Pinned to the patched versions anyway to
# clear the Dependabot alerts. Security fixes, so exempt from the cooldown
# stance; each pinned version is already well past minimumReleaseAge.
# Drop an entry once a parent bump pulls the fixed version on its own.
overrides:
  # dev-server `server.fs.deny` bypass + launch-editor NTLM (Windows).
  vite: '8.0.16'
  # SOCKS5 ProxyAgent TLS-bypass / pool reuse + cache/cookie advisories.
  undici: '7.28.0'
  # dev-server arbitrary file read on Windows.
  esbuild: '0.28.1'

# Allowlist of packages whose lifecycle (postinstall) scripts may run.
# pnpm >= 10 blocks lifecycle scripts by default — without this list,
# `esbuild` and `workerd` ship empty platform binaries and
# `wrangler dev` / `wrangler deploy` fail at runtime ("esbuild: not
# found" / workerd missing). The two entries below are the minimal
# set this repo needs; do NOT widen without a specific reason, and do
# NOT add `ignore-scripts` (it would override this allowlist).
#
# Migrated from `package.json`'s `pnpm.onlyBuiltDependencies`, which
# pnpm >= 11 silently ignores (the field is now resolved here).
onlyBuiltDependencies:
  - esbuild
  - workerd
