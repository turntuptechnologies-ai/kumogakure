name = "kumogakure"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "kumogakure"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "PAYLOADS"
bucket_name = "kumogakure-payloads"

[triggers]
crons = ["0 0 * * *"]

[vars]
BODY_R2_THRESHOLD = "8192"
RETENTION_DAYS = "30"
